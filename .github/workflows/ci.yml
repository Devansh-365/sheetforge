name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: typecheck + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm typecheck

      - name: lint
        run: pnpm lint
